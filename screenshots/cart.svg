<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2874f0"/><stop offset="100%" stop-color="#1a5dc8"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1100" height="750" fill="#f1f3f6"/>
  <!-- Header -->
  <rect width="1100" height="56" fill="url(#headerGrad)"/>
  <text x="24" y="36" fill="white" font-size="20" font-weight="700">🛍 AI Commerce</text>
  <rect x="180" y="12" rx="4" ry="4" width="400" height="32" fill="white"/>
  <text x="196" y="33" font-size="13" fill="#999">🔍 Search for products, brands and more</text>
  <text x="850" y="36" fill="white" font-size="14" font-weight="600">🛒 Cart (3 items)</text>

  <!-- Main Cart -->
  <text x="24" y="90" font-size="22" fill="#1a1a2e" font-weight="700">Shopping Cart</text>
  <text x="24" y="112" font-size="13" fill="#666">3 items in your cart</text>

  <!-- Cart Items -->
  <rect x="24" y="130" rx="12" ry="12" width="730" height="120" fill="white" filter="url(#shadow)"/>
  <rect x="40" y="146" rx="8" ry="8" width="80" height="88" fill="#e3f2fd"/>
  <text x="80" y="200" font-size="32" text-anchor="middle">📱</text>
  <text x="136" y="168" font-size="15" fill="#1a1a2e" font-weight="600">Samsung Galaxy S24 Ultra</text>
  <text x="136" y="188" font-size="12" fill="#666">Color: Titanium Gray | 12GB+256GB</text>
  <text x="136" y="208" font-size="14" fill="#388e3c" font-weight="700">₹1,24,999</text>
  <rect x="136" y="220" rx="4" ry="4" width="24" height="24" fill="#f5f5f5" stroke="#dee2e6" stroke-width="1"/>
  <text x="148" y="236" font-size="12" fill="#333" text-anchor="middle">−</text>
  <rect x="162" y="220" rx="4" ry="4" width="36" height="24" fill="white" stroke="#2874f0" stroke-width="1"/>
  <text x="180" y="236" font-size="12" fill="#2874f0" text-anchor="middle">1</text>
  <rect x="200" y="220" rx="4" ry="4" width="24" height="24" fill="#f5f5f5" stroke="#dee2e6" stroke-width="1"/>
  <text x="212" y="236" font-size="12" fill="#333" text-anchor="middle">+</text>
  <text x="600" y="210" font-size="13" fill="#d32f2f">🗑 Remove</text>

  <line x1="24" y1="260" x2="754" y2="260" stroke="#f1f3f6" stroke-width="1"/>

  <rect x="24" y="264" rx="12" ry="12" width="730" height="120" fill="white" filter="url(#shadow)"/>
  <rect x="40" y="280" rx="8" ry="8" width="80" height="88" fill="#fce4ec"/>
  <text x="80" y="334" font-size="32" text-anchor="middle">🎧</text>
  <text x="136" y="302" font-size="15" fill="#1a1a2e" font-weight="600">Wireless Noise Cancelling Headphones</text>
  <text x="136" y="322" font-size="12" fill="#666">Color: Midnight Black</text>
  <text x="136" y="342" font-size="14" fill="#388e3c" font-weight="700">₹4,999</text>
  <rect x="136" y="354" rx="4" ry="4" width="24" height="24" fill="#f5f5f5" stroke="#dee2e6" stroke-width="1"/>
  <text x="148" y="370" font-size="12" fill="#333" text-anchor="middle">−</text>
  <rect x="162" y="354" rx="4" ry="4" width="36" height="24" fill="white" stroke="#2874f0" stroke-width="1"/>
  <text x="180" y="370" font-size="12" fill="#2874f0" text-anchor="middle">2</text>
  <rect x="200" y="354" rx="4" ry="4" width="24" height="24" fill="#f5f5f5" stroke="#dee2e6" stroke-width="1"/>
  <text x="212" y="370" font-size="12" fill="#333" text-anchor="middle">+</text>
  <text x="600" y="344" font-size="13" fill="#d32f2f">🗑 Remove</text>

  <!-- Order Summary -->
  <rect x="770" y="130" rx="12" ry="12" width="310" height="320" fill="white" filter="url(#shadow)"/>
  <text x="790" y="166" font-size="16" fill="#1a1a2e" font-weight="600">Order Summary</text>
  <line x1="790" y1="178" x2="1060" y2="178" stroke="#f1f3f6" stroke-width="1"/>
  <text x="790" y="206" font-size="13" fill="#666">Subtotal (3 items)</text>
  <text x="1050" y="206" font-size="13" fill="#333" text-anchor="end">₹1,34,997</text>
  <text x="790" y="232" font-size="13" fill="#666">Delivery Fee</text>
  <text x="1050" y="232" font-size="13" fill="#388e3c" text-anchor="end">FREE</text>
  <text x="790" y="258" font-size="13" fill="#666">Discount</text>
  <text x="1050" y="258" font-size="13" fill="#388e3c" text-anchor="end">− ₹15,000</text>
  <text x="790" y="284" font-size="13" fill="#666">Tax (18% GST)</text>
  <text x="1050" y="284" font-size="13" fill="#333" text-anchor="end">₹24,299</text>
  <line x1="790" y1="298" x2="1060" y2="298" stroke="#f1f3f6" stroke-width="1"/>
  <text x="790" y="326" font-size="16" fill="#1a1a2e" font-weight="700">Total Amount</text>
  <text x="1050" y="326" font-size="18" fill="#388e3c" font-weight="700" text-anchor="end">₹1,44,296</text>
  <line x1="790" y1="338" x2="1060" y2="338" stroke="#f1f3f6" stroke-width="1"/>
  <rect x="790" y="354" rx="8" ry="8" width="270" height="48" fill="url(#headerGrad)"/>
  <text x="925" y="386" fill="white" font-size="15" font-weight="600" text-anchor="middle">🛒 Place Order</text>
  <text x="925" y="414" fill="#999" font-size="11" text-anchor="middle">🔒 Secure Payment</text>

  <!-- Coupon -->
  <rect x="24" y="400" rx="12" ry="12" width="730" height="60" fill="white" filter="url(#shadow)"/>
  <text x="40" y="436" font-size="20">🎉</text>
  <text x="70" y="430" font-size="13" fill="#1a1a2e" font-weight="500">Apply Coupon Code</text>
  <text x="70" y="448" font-size="11" fill="#666">Use code COMET10 for extra 10% off on electronics!</text>
  <rect x="560" y="414" rx="6" ry="6" width="180" height="36" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="580" y="438" font-size="12" fill="#999">Enter coupon code</text>
  <rect x="640" y="422" rx="6" ry="6" width="90" height="28" fill="url(#headerGrad)"/>
  <text x="685" y="442" fill="white" font-size="12" text-anchor="middle" font-weight="600">Apply</text>

  <!-- Saved items suggestion -->
  <rect x="24" y="480" rx="12" ry="12" width="730" height="100" fill="white" filter="url(#shadow)"/>
  <text x="40" y="510" font-size="14" fill="#1a1a2e" font-weight="600">🤖 AI Suggests for You</text>
  <rect x="40" y="526" rx="6" ry="6" width="140" height="36" fill="#fff3e0"/>
  <text x="110" y="550" font-size="12" fill="#f57c00" text-anchor="middle">Tempered Glass - ₹299</text>
  <rect x="190" y="526" rx="6" ry="6" width="140" height="36" fill="#fff3e0"/>
  <text x="260" y="550" font-size="12" fill="#f57c00" text-anchor="middle">Phone Case - ₹499</text>
  <rect x="340" y="526" rx="6" ry="6" width="160" height="36" fill="#fff3e0"/>
  <text x="420" y="550" font-size="12" fill="#f57c00" text-anchor="middle">Wireless Charger - ₹1,999</text>
</svg>