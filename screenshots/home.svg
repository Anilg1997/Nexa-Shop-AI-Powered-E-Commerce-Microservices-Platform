  <rect x="330" y="164" rx="18" ry="18" width="100" height="32" fill="rgba(255,255,255,0.2)"/>
  <text x="380" y="185" font-size="13" fill="white" text-anchor="middle">👕 Fashion</text>
  <rect x="440" y="164" rx="18" ry="18" width="100" height="32" fill="rgba(255,255,255,0.2)"/>
  <text x="490" y="185" font-size="13" fill="white" text-anchor="middle">📚 Books</text>
  <rect x="550" y="164" rx="18" ry="18" width="120" height="32" fill="rgba(255,255,255,0.2)"/>
  <text x="610" y="185" font-size="13" fill="white" text-anchor="middle">🏠 Home & Kitchen</text>
  <rect x="680" y="164" rx="18" ry="18" width="100" height="32" fill="rgba(255,255,255,0.2)"/>
  <text x="730" y="185" font-size="13" fill="white" text-anchor="middle">💄 Beauty</text>
