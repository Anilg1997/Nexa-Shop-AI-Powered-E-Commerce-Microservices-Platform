  <text x="340" y="548" fill="white" font-size="12" text-anchor="middle" font-weight="600">Add to Cart</text>

  <rect x="456" y="290" rx="8" ry="8" width="200" height="300" fill="white" filter="url(#shadow)"/>
  <rect x="456" y="290" rx="8" ry="8" width="200" height="150" fill="#e8f5e9"/>
  <text x="556" y="380" font-size="48" text-anchor="middle">⌚</text>
  <text x="472" y="464" font-size="14" fill="#1a1a2e" font-weight="600">Smart Watch</text>
  <text x="472" y="484" font-size="11" fill="#666">Heart rate, SpO2, GPS</text>
  <text x="472" y="508" font-size="16" fill="#388e3c" font-weight="700">₹3,999</text>
  <text x="542" y="508" font-size="12" fill="#666" text-decoration="line-through">₹5,999</text>
  <rect x="472" y="526" rx="6" ry="6" width="168" height="32" fill="url(#headerGrad)"/>
  <text x="556" y="548" fill="white" font-size="12" text-anchor="middle" font-weight="600">Add to Cart</text>

  <rect x="672" y="290" rx="8" ry="8" width="200" height="300" fill="white" filter="url(#shadow)"/>
  <rect x="672" y="290" rx="8" ry="8" width="200" height="150" fill="#fce4ec"/>
  <text x="772" y="380" font-size="48" text-anchor="middle">📷</text>
  <text x="688" y="464" font-size="14" fill="#1a1a2e" font-weight="600">Digital Camera</text>
  <text x="688" y="484" font-size="11" fill="#666">24MP, 4K Video, WiFi</text>
  <text x="688" y="508" font-size="16" fill="#388e3c" font-weight="700">₹45,999</text>
  <text x="758" y="508" font-size="12" fill="#666" text-decoration="line-through">₹59,999</text>
  <rect x="688" y="526" rx="6" ry="6" width="168" height="32" fill="url(#headerGrad)"/>
  <text x="772" y="548" fill="white" font-size="12" text-anchor="middle" font-weight="600">Add to Cart</text>

  <rect x="888" y="290" rx="8" ry="8" width="200" height="300" fill="white" filter="url(#shadow)"/>
  <rect x="888" y="290" rx="8" ry="8" width="200" height="150" fill="#f3e5f5"/>
  <text x="988" y="380" font-size="48" text-anchor="middle">💻</text>
  <text x="904" y="464" font-size="14" fill="#1a1a2e" font-weight="600">Laptop Ultra</text>
  <text x="904" y="484" font-size="11" fill="#666">16GB RAM, 512GB SSD</text>
  <text x="904" y="508" font-size="16" fill="#388e3c" font-weight="700">₹59,999</text>
  <text x="974" y="508" font-size="12" fill="#666" text-decoration="line-through">₹74,999</text>
  <rect x="904" y="526" rx="6" ry="6" width="168" height="32" fill="url(#headerGrad)"/>
  <text x="988" y="548" fill="white" font-size="12" text-anchor="middle" font-weight="600">Add to Cart</text>

  <!-- AI Chat FAB -->
  <circle cx="1030" cy="690" r="30" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="1030" y="698" font-size="24" fill="white" text-anchor="middle">🤖</text>
</svg>