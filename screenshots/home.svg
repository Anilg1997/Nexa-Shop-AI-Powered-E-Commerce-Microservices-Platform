  <text x="196" y="33" font-size="13" fill="#999">🔍 Search for products, brands and more</text>
  <text x="640" y="36" fill="white" font-size="14" font-weight="500">Login</text>
  <rect x="710" y="14" rx="6" ry="6" width="90" height="28" fill="white"/>
