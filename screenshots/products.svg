  <rect x="40" y="268" rx="6" ry="6" width="208" height="4" fill="#e0e0e0"/>
  <circle cx="100" cy="270" r="8" fill="#2874f0"/>
  <circle cx="160" cy="270" r="8" fill="#2874f0"/>

