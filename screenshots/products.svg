  <rect x="40" y="314" rx="4" ry="4" width="14" height="14" fill="#2874f0"/>
  <text x="44" y="326" fill="white" font-size="9">✓</text>
  <text x="62" y="326" font-size="12" fill="#333">Samsung</text>
  <rect x="160" y="314" rx="4" ry="4" width="14" height="14" fill="white" stroke="#dee2e6" stroke-width="1"/>
