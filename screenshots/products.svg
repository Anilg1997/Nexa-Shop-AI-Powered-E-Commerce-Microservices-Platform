<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2874f0"/><stop offset="100%" stop-color="#1a5dc8"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1100" height="750" fill="#f1f3f6"/>
  <!-- Header -->
  <rect width="1100" height="56" fill="url(#headerGrad)"/>
  <text x="24" y="36" fill="white" font-size="20" font-weight="700">🛍 AI Commerce</text>
