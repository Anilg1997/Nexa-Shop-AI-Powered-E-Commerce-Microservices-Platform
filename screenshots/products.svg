  <text x="830" y="252" font-size="12" fill="#2874f0" font-weight="500">🤖 AI Pick</text>

  <line x1="280" y1="290" x2="1070" y2="290" stroke="#f1f3f6" stroke-width="1"/>

  <!-- Product 2 -->
  <rect x="280" y="294" rx="12" ry="12" width="790" height="120" fill="white" filter="url(#shadow)"/>
  <rect x="296" y="310" rx="8" ry="8" width="100" height="88" fill="#fce4ec"/>
