  <line x1="280" y1="428" x2="1070" y2="428" stroke="#f1f3f6" stroke-width="1"/>

  <!-- Product 3 -->
  <rect x="280" y="432" rx="12" ry="12" width="790" height="120" fill="white" filter="url(#shadow)"/>
  <rect x="296" y="448" rx="8" ry="8" width="100" height="88" fill="#fff3e0"/>
  <text x="346" y="506" font-size="36" text-anchor="middle">📱</text>
  <text x="412" y="470" font-size="15" fill="#1a1a2e" font-weight="600">OnePlus 12 Pro</text>
  <rect x="412" y="480" rx="4" ry="4" width="70" height="18" fill="#388e3c"/>
