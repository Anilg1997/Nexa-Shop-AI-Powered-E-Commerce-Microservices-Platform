  <text x="412" y="510" font-size="12" fill="#666">16GB RAM, 512GB, Hasselblad Camera</text>
  <text x="412" y="530" font-size="18" fill="#388e3c" font-weight="700">₹69,999</text>
  <text x="500" y="530" font-size="12" fill="#666" text-decoration="line-through">₹89,999</text>
  <rect x="830" y="476" rx="8" ry="8" width="120" height="36" fill="url(#headerGrad)"/>
  <text x="890" y="500" fill="white" font-size="12" text-anchor="middle" font-weight="600">Add to Cart</text>
  <text x="830" y="528" font-size="12" fill="#d32f2f" font-weight="600">-22% Offer</text>

  <!-- Pagination -->
