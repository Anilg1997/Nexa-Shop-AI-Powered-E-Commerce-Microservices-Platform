  <text x="618" y="604" font-size="13" fill="#2874f0" text-anchor="middle" font-weight="600">1</text>
  <rect x="640" y="580" rx="6" ry="6" width="36" height="36" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="658" y="604" font-size="13" fill="#666" text-anchor="middle">2</text>
  <rect x="680" y="580" rx="6" ry="6" width="36" height="36" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="698" y="604" font-size="13" fill="#666" text-anchor="middle">3</text>
  <text x="720" y="604" font-size="13" fill="#666">...</text>
  <rect x="740" y="580" rx="6" ry="6" width="36" height="36" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="758" y="604" font-size="13" fill="#666" text-anchor="middle">8</text>
