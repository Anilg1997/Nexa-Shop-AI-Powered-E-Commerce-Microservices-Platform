  <rect x="40" y="344" rx="4" ry="4" width="14" height="14" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="62" y="356" font-size="12" fill="#333">OnePlus</text>
  <rect x="160" y="344" rx="4" ry="4" width="14" height="14" fill="white" stroke="#dee2e6" stroke-width="1"/>
  <text x="180" y="356" font-size="12" fill="#333">Xiaomi</text>

  <text x="40" y="390" font-size="13" fill="#333" font-weight="500">RAM</text>
  <rect x="40" y="398" rx="14" ry="14" width="60" height="28" fill="#e3f2fd" stroke="#2874f0" stroke-width="1"/>
  <text x="70" y="417" font-size="11" fill="#2874f0" text-anchor="middle">4GB</text>
