server:
  port: 8089
spring:
  application:
    name: analytics-service
  datasource:
    url: ${ANALYTICS_DB_URL:jdbc:postgresql://localhost:5432/analyticsdb}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.anilg.ecommerce.common
        spring.json.value.default.type: com.anilg.ecommerce.common.DomainEvent
        spring.json.use.type.headers: false
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
management:
  endpoints:
    web:
      exposure:
        include: health,info
